name: "Tofu Plan"

on:
  pull_request:
    branches:
      - main
env:
  TF_VERSION: "1.6.6"
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  tofu-plan:
    name: "Tofu Plan"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup OpenTofu"
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6

      - name: "Tofu Format Check"
        id: fmt
        run: tofu fmt -check -recursive
        continue-on-error: true

      - name: Configure Git for private modules
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: "Tofu Init"
        id: init
        run: tofu init

      - name: "Tofu Validate"
        id: validate
        run: tofu validate -no-color

      - name: "Tofu Plan"
        id: plan
        run: |
          tofu plan -no-color -out=tfplan
          tofu show -no-color tfplan > plan_output.txt
        continue-on-error: true

      - name: "Comment PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "tofu\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Tofu Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Tofu Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Tofu Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Tofu Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`tofu
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: "Tofu Plan Status"
        if: steps.plan.outcome == 'failure'
        run: exit 1
